services:
  - type: web
    name: clustron-api
    runtime: python
    plan: free
    buildCommand: "cd backend && pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt"
    startCommand: "cd backend && gunicorn --bind 0.0.0.0:$PORT api:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FLASK_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
